<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>DOCH – Animation</title>
  <style>
    body {
      background: #111;
      color: #f33;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .doch {
      font-size: 48px;
      font-weight: bold;
      animation: pulse 1.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%   { opacity: 0.3; transform: scale(0.95); }
      50%  { opacity: 1;   transform: scale(1.10); }
      100% { opacity: 0.3; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div class="doch">DOCH</div>
</body>
</html>
